<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paste Pocket</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GitHub Pages + Local Vault</p>
          <h1>Paste Pocket</h1>
          <p class="subcopy">把常用话术、训练命令和敏感凭据放进一个能快速搜索、分类和复制的小助手。</p>
        </div>
        <div class="topbar-actions">
          <button id="add-item-button" class="primary">新增条目</button>
        </div>
      </header>

      <section class="security-banner">
        <strong>安全边界：</strong>
        仓库里只放公开示例；你自己新增的敏感信息只保存在当前浏览器的本地加密保险箱中，不会自动上传到 GitHub。
      </section>

      <section class="toolbar">
        <label class="field grow">
          <span>搜索</span>
          <input id="search-input" type="search" placeholder="搜索标题、标签、正文、命令参数" />
        </label>

        <label class="field">
          <span>范围</span>
          <select id="scope-filter">
            <option value="all">全部</option>
            <option value="seed">公开示例</option>
            <option value="local">本地模板</option>
            <option value="vault">加密保险箱</option>
          </select>
        </label>

        <label class="field">
          <span>类型</span>
          <select id="type-filter">
            <option value="all">全部</option>
            <option value="text">话术</option>
            <option value="command">命令</option>
            <option value="credential">凭据</option>
          </select>
        </label>

        <label class="field">
          <span>分类</span>
          <select id="category-filter">
            <option value="all">全部</option>
          </select>
        </label>

        <label class="checkbox">
          <input id="favorites-only" type="checkbox" />
          <span>只看收藏</span>
        </label>
      </section>

      <section class="vault-panel">
        <div class="vault-card">
          <div>
            <p class="card-label">本地加密保险箱</p>
            <p id="vault-status" class="vault-status">未初始化</p>
          </div>

          <div class="vault-controls">
            <input id="vault-password" type="password" placeholder="输入主密码" />
            <button id="vault-create-button">创建保险箱</button>
            <button id="vault-unlock-button">解锁</button>
            <button id="vault-lock-button">锁定</button>
            <button id="vault-export-button">导出备份</button>
            <label class="import-button">
              <input id="vault-import-input" type="file" accept="application/json" />
              <span>导入备份</span>
            </label>
          </div>
        </div>
      </section>

      <main class="workspace">
        <section class="list-panel">
          <div class="panel-head">
            <h2>条目列表</h2>
            <span id="item-count" class="panel-count">0 条</span>
          </div>
          <div id="item-list" class="item-list"></div>
        </section>

        <section class="detail-panel">
          <div id="detail-empty" class="detail-empty">
            <h2>选中一条内容查看详情</h2>
            <p>这里会展示正文、命令、复制按钮、备注和链接。</p>
          </div>
          <article id="detail-view" class="detail-view hidden"></article>
        </section>
      </main>
    </div>

    <div id="status-toast" class="status-toast hidden" aria-live="polite"></div>

    <dialog id="item-dialog" class="item-dialog">
      <form id="item-form" method="dialog">
        <div class="dialog-head">
          <h2 id="dialog-title">新增条目</h2>
          <button type="button" id="dialog-close-button" class="ghost">关闭</button>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>保存位置</span>
            <select id="entry-storage" name="storage">
              <option value="local">本地模板</option>
              <option value="vault">加密保险箱</option>
            </select>
          </label>

          <label class="field">
            <span>类型</span>
            <select id="entry-type" name="type">
              <option value="text">话术</option>
              <option value="command">命令</option>
              <option value="credential">凭据</option>
            </select>
          </label>

          <label class="field">
            <span>标题</span>
            <input id="entry-title" name="title" required />
          </label>

          <label class="field">
            <span>分类</span>
            <input id="entry-category" name="category" placeholder="例如：发货、训练、登录" />
          </label>

          <label class="field">
            <span>标签</span>
            <input id="entry-tags" name="tags" placeholder="用逗号分隔，例如：教程, 邮箱, 首登" />
          </label>

          <label class="field">
            <span>链接</span>
            <input id="entry-link" name="link" placeholder="https://..." />
          </label>

          <label class="field span-2">
            <span>正文 / 命令</span>
            <textarea id="entry-content" name="content" rows="8" placeholder="输入话术内容或多行命令"></textarea>
          </label>

          <label class="field command-only">
            <span>命令环境</span>
            <input id="entry-shell" name="shell" placeholder="bash / powershell / zsh" />
          </label>

          <label class="field credential-only">
            <span>用户名 / 账号</span>
            <input id="entry-username" name="username" placeholder="邮箱、手机号、账号名" />
          </label>

          <label class="field credential-only">
            <span>密码</span>
            <input id="entry-password" name="password" type="password" />
          </label>

          <label class="field credential-only">
            <span>密钥 / Token</span>
            <input id="entry-secret" name="secret" type="password" />
          </label>

          <label class="field span-2">
            <span>备注</span>
            <textarea id="entry-notes" name="notes" rows="4" placeholder="例如：次日记得修改辅助邮箱；训练前确认数据路径"></textarea>
          </label>
        </div>

        <p class="dialog-tip">
          提醒：敏感信息请存进加密保险箱，不要放进仓库，也不要直接发送给外部 AI 分类接口。
        </p>

        <div class="dialog-actions">
          <button type="submit" class="primary">保存</button>
        </div>
      </form>
    </dialog>

    <template id="detail-template">
      <div class="detail-header">
        <div>
          <p class="detail-kicker"></p>
          <h2 class="detail-title"></h2>
          <div class="detail-meta"></div>
        </div>
        <div class="detail-actions"></div>
      </div>

      <div class="detail-body"></div>
      <div class="detail-notes hidden"></div>
      <div class="detail-link hidden"></div>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
